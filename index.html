<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jordi Miravet">
    <meta name="keywords" content="HTML, CSS, SCSS, SASS, Bootstrap">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">
                <a href="#">
                    <img src="images/logo-bookmark.svg" alt="Logotipo de Bookmark">
                </a>
            </h1>
            <button class="menu-toggle" aria-label="Abrir menú">
                ☰
            </button>

            <ul class="nav-links">
                <li><a href="#">Feature</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">Contact</a></li>
                <li><a class="btn-loggin" href="#">Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="hero__image">
                <img src="./images/illustration-hero.svg" alt="imagen de muestra">
            </div>
            <div class="hero__content">
                <h2 class="hero__title">A simple bookmark manager</h2>
                <p class="hero__text">A clean and simple interface to organize your favourite websites. Open a new browser tab and see your sites load instantly. Try it for free.</p>
                <div class="hero__buttons">
                    <button type="button" class="btn btn-blue">Get it on Chrome</button>
                    <button type="button" class="btn btn-white">Get it on Firefox</button>
                </div>
            </div>
        </section>
    </main>
    


    <script src="./js/main.js"></script>
</body>
</html>
